<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QA Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #21263a;
      --border: #2a2f45;
      --accent: #4f8ef7;
      --accent2: #7c5af7;
      --text: #e2e6f3;
      --text-dim: #7b82a0;
      --jira-blue: #3b82f6;
      --confluence-teal: #14b8a6;
      --status-done: #22c55e;
      --status-inprogress: #f59e0b;
      --status-todo: #6b7280;
      --status-review: #a855f7;
      --status-blocked: #ef4444;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 28px 40px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo-sub {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 400;
    }

    /* ── Search bar ── */
    .search-wrap {
      padding: 32px 40px 24px;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 0 18px;
      transition: border-color 0.2s;
    }
    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
    }
    .search-icon { color: var(--text-dim); flex-shrink: 0; }
    #searchInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 16px;
      color: var(--text);
      padding: 16px 0;
    }
    #searchInput::placeholder { color: var(--text-dim); }
    .search-hint {
      font-size: 12px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 0 40px 20px;
    }
    .tab {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-dim);
      border: 1.5px solid transparent;
      transition: all 0.15s;
      user-select: none;
      background: transparent;
    }
    .tab:hover { color: var(--text); background: var(--surface); }
    .tab.active {
      color: var(--text);
      border-color: var(--border);
      background: var(--surface);
    }
    .tab .count {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 7px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .tab.jira-tab .count { background: rgba(59,130,246,0.2); color: #93c5fd; }
    .tab.conf-tab .count { background: rgba(20,184,166,0.2); color: #5eead4; }
    .tab.drive-tab .count { background: rgba(251,191,36,0.2); color: #fcd34d; }
    .tab.slack-tab .count { background: rgba(232,72,85,0.2); color: #f87171; }

    /* ── Filter chips ── */
    .filter-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .chip {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      transition: all 0.15s;
      user-select: none;
    }
    .chip:hover { border-color: var(--accent); color: var(--text); }
    .chip.active {
      background: rgba(79,142,247,0.15);
      border-color: rgba(79,142,247,0.4);
      color: #93c5fd;
    }
    .chip.space-chip.active {
      background: rgba(20,184,166,0.15);
      border-color: rgba(20,184,166,0.4);
      color: #5eead4;
    }

    /* ── Slack card ── */
    .card-slack-icon {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; color: #f87171; margin-bottom: 10px;
    }
    .badge-channel {
      font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 20px;
      background: rgba(232,72,85,0.12); color: #f87171; border: 1px solid rgba(232,72,85,0.2);
      font-family: monospace;
    }

    /* ── Drive card ── */
    .card-drive-icon {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; color: #fbbf24; margin-bottom: 10px;
    }
    .badge-mime {
      font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px;
      background: rgba(251,191,36,0.12); color: #fcd34d; border: 1px solid rgba(251,191,36,0.2);
    }

    /* ── Content ── */
    .content { padding: 0 40px 60px; }

    /* ── States ── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 60px;
      color: var(--text-dim);
      font-size: 14px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .section-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .section-label.jira { color: var(--jira-blue); }
    .section-label.confluence { color: var(--confluence-teal); }
    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .section-count {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ── Grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    /* Jira card */
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    .card-key {
      font-size: 12px;
      font-weight: 600;
      color: var(--jira-blue);
      font-family: monospace;
      flex-shrink: 0;
    }
    .card-badges { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .badge-type {
      background: rgba(79,142,247,0.12);
      color: #93c5fd;
      border: 1px solid rgba(79,142,247,0.2);
    }
    .badge-status-done     { background: rgba(34,197,94,0.15);  color: #86efac; border: 1px solid rgba(34,197,94,0.2); }
    .badge-status-progress { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.2); }
    .badge-status-todo     { background: rgba(107,114,128,0.2); color: #9ca3af; border: 1px solid rgba(107,114,128,0.2); }
    .badge-status-review   { background: rgba(168,85,247,0.15); color: #d8b4fe; border: 1px solid rgba(168,85,247,0.2); }
    .badge-status-blocked  { background: rgba(239,68,68,0.15);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
    .badge-priority-high   { background: rgba(239,68,68,0.12);  color: #fca5a5; }
    .badge-priority-medium { background: rgba(245,158,11,0.12); color: #fcd34d; }
    .badge-priority-low    { background: rgba(107,114,128,0.15);color: #9ca3af; }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.45;
      margin-bottom: 8px;
      color: var(--text);
    }
    .card-desc {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-dim);
    }
    .card-assignee { display: flex; align-items: center; gap: 6px; }
    .avatar {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: white; flex-shrink: 0;
    }

    /* Confluence card */
    .card-conf-icon {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--confluence-teal);
      margin-bottom: 10px;
    }
    .card-space {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(20,184,166,0.12);
      color: #5eead4;
      border: 1px solid rgba(20,184,166,0.2);
      margin-bottom: 10px;
    }

    /* ── No results ── */
    .no-results {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
      font-size: 14px;
    }

    /* ── Bug toggle ── */
    .toggle-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      transition: all 0.15s;
      user-select: none;
    }
    .toggle-btn:hover { border-color: #ef4444; color: #fca5a5; }
    .toggle-btn.on {
      background: rgba(239,68,68,0.15);
      border-color: rgba(239,68,68,0.4);
      color: #fca5a5;
    }
    .toggle-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      transition: opacity 0.15s;
    }

    /* ── Divider between sections in "all" tab ── */
    .section-divider { margin-bottom: 32px; }

    /* ── Cache status bar ── */
    .cache-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 40px 18px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .cache-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--status-done);
      flex-shrink: 0;
    }
    .cache-dot.loading {
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .cache-dot.empty { background: var(--text-dim); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .cache-refresh {
      margin-left: 4px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 11px;
      padding: 2px 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .cache-refresh:hover { border-color: var(--accent); color: var(--text); }

    @media (max-width: 600px) {
      header, .search-wrap, .tabs, .cache-bar, .content { padding-left: 16px; padding-right: 16px; }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">QA Search</div>
  </div>
  <div class="logo-sub">Jira GS · Confluence · Drive</div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="searchInput" type="text" placeholder="검색어를 입력하세요..." autocomplete="off" />
    <span class="search-hint" id="searchHint"></span>
  </div>
</div>

<div class="tabs" id="tabs" style="display:none">
  <button class="tab active" data-tab="all">전체</button>
  <button class="tab jira-tab" data-tab="jira">
    Jira <span class="count" id="jiraCount">0</span>
  </button>
  <button class="tab conf-tab" data-tab="confluence">
    Confluence <span class="count" id="confCount">0</span>
  </button>
  <button class="tab slack-tab" data-tab="slack">
    Slack <span class="count" id="slackCount">0</span>
  </button>
  <button class="tab drive-tab" data-tab="drive">
    Drive <span class="count" id="driveCount">0</span>
  </button>
</div>

<div class="cache-bar" id="cacheBar">
  <span class="cache-dot empty" id="cacheDot"></span>
  <span id="cacheLabel">캐시 로딩 중...</span>
  <button class="cache-refresh" id="cacheRefreshBtn">새로고침</button>
</div>

<div class="content" id="content">
  <div class="empty-state">
    <div class="icon">🔍</div>
    <h3>무엇이든 검색해보세요</h3>
    <p>Jira 이슈와 Confluence 페이지를 한번에 검색합니다</p>
  </div>
</div>

<script>
  const input = document.getElementById('searchInput');
  const content = document.getElementById('content');
  const tabs = document.getElementById('tabs');
  const hint = document.getElementById('searchHint');

  // ── Cache status ──
  const cacheDot = document.getElementById('cacheDot');
  const cacheLabel = document.getElementById('cacheLabel');
  const cacheRefreshBtn = document.getElementById('cacheRefreshBtn');

  async function pollCacheStatus() {
    try {
      const res = await fetch('/api/status');
      const s = await res.json();
      const parts = [];
      if (s.jira_count > 0) parts.push(`Jira ${s.jira_count.toLocaleString()}건`);
      if (s.confluence_count > 0) parts.push(`Confluence ${s.confluence_count.toLocaleString()}건`);

      if (s.loading) {
        cacheDot.className = 'cache-dot loading';
        const progress = parts.length ? `(${parts.join(' · ')} 로드됨) ` : '';
        cacheLabel.textContent = `${progress}캐시 로딩 중...`;
        setTimeout(pollCacheStatus, 2000);
      } else if (s.last_updated) {
        cacheDot.className = 'cache-dot';
        cacheLabel.textContent = `${parts.join(' · ')} · ${s.last_updated} 기준`;
      } else {
        cacheDot.className = 'cache-dot empty';
        cacheLabel.textContent = '데이터 없음';
      }
    } catch { }
  }

  cacheRefreshBtn.addEventListener('click', async () => {
    await fetch('/api/refresh', { method: 'POST' });
    cacheDot.className = 'cache-dot loading';
    cacheLabel.textContent = '캐시 갱신 중...';
    setTimeout(pollCacheStatus, 2000);
  });

  pollCacheStatus();

  let currentTab = 'all';
  let lastData = null;
  let debounceTimer = null;
  let bugOnly = true;        // 기본: 버그만 보기 ON
  let statusFilter = 'all';  // Jira 상태 필터
  let spaceFilter = 'all';   // Confluence 스페이스 필터

  // 이벤트 위임: 버그 토글 + 필터 칩
  content.addEventListener('click', e => {
    if (e.target.closest('#bugToggle')) {
      bugOnly = !bugOnly;
      if (lastData) renderResults(lastData);
      return;
    }
    const chip = e.target.closest('.status-chip');
    if (chip) {
      statusFilter = chip.dataset.val;
      if (lastData) renderResults(lastData);
      return;
    }
    const spc = e.target.closest('.space-chip');
    if (spc) {
      spaceFilter = spc.dataset.val;
      if (lastData) renderResults(lastData);
    }
  });

  input.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const q = input.value.trim();
    if (!q) {
      showEmpty();
      return;
    }
    hint.textContent = '검색 중...';
    debounceTimer = setTimeout(() => doSearch(q), 400);
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      clearTimeout(debounceTimer);
      const q = input.value.trim();
      if (q) doSearch(q);
    }
  });

  document.getElementById('tabs').addEventListener('click', e => {
    const tab = e.target.closest('[data-tab]');
    if (!tab) return;
    currentTab = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab));
    if (lastData) renderResults(lastData);
  });

  async function doSearch(q) {
    showLoading();
    try {
      const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      lastData = data;
      document.getElementById('jiraCount').textContent = data.jira.length;
      document.getElementById('confCount').textContent = data.confluence.length;
      document.getElementById('slackCount').textContent = (data.slack || []).length;
      document.getElementById('driveCount').textContent = (data.drive || []).length;
      tabs.style.display = 'flex';
      hint.textContent = `Jira ${data.jira.length}건 · Confluence ${data.confluence.length}건 · Slack ${(data.slack||[]).length}건 · Drive ${(data.drive||[]).length}건`;
      renderResults(data);
    } catch (err) {
      content.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>오류가 발생했습니다</h3><p>${err.message}</p></div>`;
      hint.textContent = '';
    }
  }

  const BUG_TYPES = ['버그', 'Bug', 'bug'];
  const STATUS_OPTIONS = [
    { val: 'all', label: '전체' },
    { val: 'inprogress', label: '진행 중' },
    { val: 'todo', label: '할 일' },
    { val: 'done', label: '완료' },
    { val: 'review', label: '검토 중' },
    { val: 'blocked', label: '차단됨' },
  ];
  const STATUS_MAP = {
    'inprogress': ['In Progress', '진행 중'],
    'todo': ['To Do', '할 일'],
    'done': ['Done', '완료'],
    'review': ['In Review', '검토 중'],
    'blocked': ['Blocked', '차단됨'],
  };
  const SPACE_OPTIONS = [
    { val: 'all', label: '전체' },
    { val: 'Game Studio', label: 'Game Studio' },
    { val: 'CVS', label: 'CVS' },
  ];

  function renderResults(data) {
    const showJira = currentTab === 'all' || currentTab === 'jira';
    const showConf = currentTab === 'all' || currentTab === 'confluence';
    const showSlack = currentTab === 'all' || currentTab === 'slack';
    const showDrive = currentTab === 'all' || currentTab === 'drive';

    let jiraItems = bugOnly ? data.jira.filter(r => BUG_TYPES.includes(r.type)) : data.jira;
    if (statusFilter !== 'all') {
      const allowed = STATUS_MAP[statusFilter] || [];
      jiraItems = jiraItems.filter(r => allowed.includes(r.status));
    }

    let confItems = data.confluence;
    if (spaceFilter !== 'all') {
      confItems = confItems.filter(r => r.space === spaceFilter);
    }

    const driveItems = data.drive || [];

    let html = '';

    if (showJira) {
      const statusChips = STATUS_OPTIONS.map(o =>
        `<button class="chip status-chip ${statusFilter === o.val ? 'active' : ''}" data-val="${o.val}">${o.label}</button>`
      ).join('');
      const toggleHtml = `<button class="toggle-btn ${bugOnly ? 'on' : ''}" id="bugToggle">
        <span class="toggle-dot"></span>버그만 보기
      </button>`;
      html += `<div class="section-divider">
        <div class="section-header">
          <span class="section-label jira">Jira</span>
          ${toggleHtml}
          <div class="filter-chips">${statusChips}</div>
          <div class="section-line"></div>
          <span class="section-count">${jiraItems.length}건</span>
        </div>`;
      if (jiraItems.length === 0) {
        html += `<div class="no-results">이슈 없음</div>`;
      } else {
        html += `<div class="cards-grid">` + jiraItems.map(jiraCard).join('') + `</div>`;
      }
      html += `</div>`;
    }

    if (showConf) {
      const spaceChips = SPACE_OPTIONS.map(o =>
        `<button class="chip space-chip ${spaceFilter === o.val ? 'active' : ''}" data-val="${o.val}">${o.label}</button>`
      ).join('');
      html += `<div class="section-divider">
        <div class="section-header">
          <span class="section-label confluence">Confluence</span>
          <div class="filter-chips">${spaceChips}</div>
          <div class="section-line"></div>
          <span class="section-count">${confItems.length}건</span>
        </div>`;
      if (confItems.length === 0) {
        html += `<div class="no-results">결과 없음</div>`;
      } else {
        html += `<div class="cards-grid">` + confItems.map(confCard).join('') + `</div>`;
      }
      html += `</div>`;
    }

    if (showSlack) {
      const slackItems = data.slack || [];
      html += `<div class="section-divider">
        <div class="section-header">
          <span class="section-label" style="color:#f87171">Slack</span>
          <div class="section-line"></div>
          <span class="section-count">${slackItems.length}건</span>
        </div>`;
      if (slackItems.length === 0) {
        html += `<div class="no-results">채널 없음</div>`;
      } else {
        html += `<div class="cards-grid">` + slackItems.map(slackCard).join('') + `</div>`;
      }
      html += `</div>`;
    }

    if (showDrive) {
      html += `<div class="section-divider">
        <div class="section-header">
          <span class="section-label" style="color:#fbbf24">Drive</span>
          <div class="section-line"></div>
          <span class="section-count">${driveItems.length}건</span>
        </div>`;
      if (driveItems.length === 0) {
        html += `<div class="no-results">결과 없음</div>`;
      } else {
        html += `<div class="cards-grid">` + driveItems.map(driveCard).join('') + `</div>`;
      }
      html += `</div>`;
    }

    content.innerHTML = html;
  }

  function jiraCard(r) {
    const statusClass = {
      '완료': 'done', 'Done': 'done',
      '진행 중': 'progress', 'In Progress': 'progress',
      '할 일': 'todo', 'To Do': 'todo',
      'In Review': 'review', '검토 중': 'review',
      'Blocked': 'blocked', '차단됨': 'blocked',
    }[r.status] || 'todo';

    const priorityClass = {
      'Highest': 'high', 'High': 'high', '주요': 'high', '높음': 'high',
      'Medium': 'medium', '중간': 'medium',
      'Low': 'low', 'Lowest': 'low', '낮음': 'low',
    }[r.priority] || 'low';

    const initials = (r.assignee || 'U').split(/[\s(]/)[0].slice(0, 2).toUpperCase();

    return `<a class="card" href="${esc(r.url)}" target="_blank" rel="noopener">
      <div class="card-top">
        <span class="card-key">${esc(r.key)}</span>
        <div class="card-badges">
          <span class="badge badge-type">${esc(r.type)}</span>
          <span class="badge badge-status-${statusClass}">${esc(r.status)}</span>
        </div>
      </div>
      <div class="card-title">${esc(r.summary)}</div>
      ${r.description ? `<div class="card-desc">${esc(r.description)}</div>` : ''}
      <div class="card-footer">
        <div class="card-assignee">
          <div class="avatar">${initials}</div>
          <span>${esc(r.assignee)}</span>
        </div>
        <span>${esc(r.updated)}</span>
      </div>
    </a>`;
  }

  function confCard(r) {
    const initials = (r.modified_by || 'U').split(/[\s(]/)[0].slice(0, 2).toUpperCase();
    return `<a class="card" href="${esc(r.url)}" target="_blank" rel="noopener">
      <div class="card-conf-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.045 17.4c-.233.375-.075.84.33 1.035l3.345 1.62c.39.195.87.06 1.095-.315l.9-1.5c1.68 2.46 4.41 4.26 7.635 4.26 4.95 0 8.985-4.035 8.985-8.985S20.4.525 15.45.525c-2.4 0-4.59.93-6.225 2.445L11.46 5.49c1.05-.99 2.46-1.59 4.005-1.59 3.255 0 5.895 2.64 5.895 5.895s-2.64 5.895-5.895 5.895c-2.115 0-3.96-1.11-5.01-2.775l1.53-.93c.39-.24.495-.75.225-1.11L9.3 8.31c-.255-.33-.72-.405-1.065-.18L2.37 11.865c-.39.24-.495.75-.225 1.11l1.44 1.86-1.54 2.565z"/>
        </svg>
        Confluence
      </div>
      <div class="card-title">${esc(r.title)}</div>
      <div style="margin-bottom:12px">
        <span class="card-space">${esc(r.space)}</span>
      </div>
      <div class="card-footer">
        <div class="card-assignee">
          <div class="avatar" style="background:linear-gradient(135deg,#14b8a6,#06b6d4)">${initials}</div>
          <span>${esc(r.modified_by)}</span>
        </div>
        <span>${esc(r.last_modified)}</span>
      </div>
    </a>`;
  }

  function slackCard(r) {
    const archivedBadge = r.archived
      ? `<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(107,114,128,0.2);color:#9ca3af;border:1px solid rgba(107,114,128,0.2);margin-left:6px">보관됨</span>`
      : '';
    return `<a class="card" href="${esc(r.url)}" target="_blank" rel="noopener">
      <div class="card-slack-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M5.042 15.165a2.528 2.528 0 0 1-2.52 2.523A2.528 2.528 0 0 1 0 15.165a2.527 2.527 0 0 1 2.522-2.52h2.52v2.52zM6.313 15.165a2.527 2.527 0 0 1 2.521-2.52 2.527 2.527 0 0 1 2.521 2.52v6.313A2.528 2.528 0 0 1 8.834 24a2.528 2.528 0 0 1-2.521-2.522v-6.313zM8.834 5.042a2.528 2.528 0 0 1-2.521-2.52A2.528 2.528 0 0 1 8.834 0a2.528 2.528 0 0 1 2.521 2.522v2.52H8.834zM8.834 6.313a2.528 2.528 0 0 1 2.521 2.521 2.528 2.528 0 0 1-2.521 2.521H2.522A2.528 2.528 0 0 1 0 8.834a2.528 2.528 0 0 1 2.522-2.521h6.312zM18.956 8.834a2.528 2.528 0 0 1 2.522-2.521A2.528 2.528 0 0 1 24 8.834a2.528 2.528 0 0 1-2.522 2.521h-2.522V8.834zM17.688 8.834a2.528 2.528 0 0 1-2.523 2.521 2.527 2.527 0 0 1-2.52-2.521V2.522A2.527 2.527 0 0 1 15.165 0a2.528 2.528 0 0 1 2.523 2.522v6.312zM15.165 18.956a2.528 2.528 0 0 1 2.523 2.522A2.528 2.528 0 0 1 15.165 24a2.527 2.527 0 0 1-2.52-2.522v-2.522h2.52zM15.165 17.688a2.527 2.527 0 0 1-2.52-2.523 2.526 2.526 0 0 1 2.52-2.52h6.313A2.527 2.527 0 0 1 24 15.165a2.528 2.528 0 0 1-2.522 2.523h-6.313z"/>
        </svg>
        Slack${archivedBadge}
      </div>
      <div class="card-title">#${esc(r.name)}</div>
    </a>`;
  }

  function driveCard(r) {
    return `<a class="card" href="${esc(r.url)}" target="_blank" rel="noopener">
      <div class="card-drive-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6.28 3L1 12.5l4.28 7.5h13.44L23 12.5 17.72 3H6.28zm1.14 2h8.56l4.28 7.5H3.14L7.42 5zM5.14 17l-2.5-4.5h18.72l-2.5 4.5H5.14z"/>
        </svg>
        Google Drive
      </div>
      <div class="card-title">${esc(r.title)}</div>
      <div style="margin-bottom:12px">
        <span class="badge badge-mime">${esc(r.mime_label)}</span>
      </div>
    </a>`;
  }

  function showLoading() {
    content.innerHTML = `<div class="loading"><div class="spinner"></div> 검색 중...</div>`;
  }

  function showEmpty() {
    tabs.style.display = 'none';
    hint.textContent = '';
    lastData = null;
    content.innerHTML = `<div class="empty-state">
      <div class="icon">🔍</div>
      <h3>무엇이든 검색해보세요</h3>
      <p>Jira 이슈 · Confluence 페이지 · Google Drive 파일을 한번에 검색합니다</p>
    </div>`;
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // auto-focus
  input.focus();
</script>
</body>
</html>
